name: 'Forge AI — Quality Gates for AI-Assisted Code'
description: 'Prevent AI limbo engineering. Quality scanning, PR delta analysis, and governance gates for every pull request.'
author: 'Forge Space'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  command:
    description: 'Command to run: gate (default), scan, diff, assess, migrate'
    required: false
    default: 'gate'
  threshold:
    description: 'Minimum quality score (0-100). Only used with gate command.'
    required: false
    default: '60'
  config:
    description: 'Path to .forgerc.json config file (auto-detected if omitted)'
    required: false
    default: ''
  comment:
    description: 'Post PR comment with results'
    required: false
    default: 'true'
  annotations:
    description: 'Add inline file annotations for findings'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Quality score (0-100)'
  delta:
    description: 'Score change compared to base branch'
  passed:
    description: 'Whether the quality gate passed (true/false)'
  findings-count:
    description: 'Number of new findings in this PR'
  readiness:
    description: 'Migration readiness: ready, needs-work, or high-risk (assess/migrate only)'
  strategy:
    description: 'Recommended migration strategy (assess/migrate only)'

runs:
  using: 'node20'
  main: 'dist/index.js'
