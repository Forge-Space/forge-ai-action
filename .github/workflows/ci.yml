name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    uses: Forge-Space/.github/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: "22"
      run-lint: true
      run-test: true
      run-typecheck: true
      run-build: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
